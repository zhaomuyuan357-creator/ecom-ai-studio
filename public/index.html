<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电商 AI 智能化生成终端</title>
  <style>
    /* ========== 1. 基础物理配置 ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; min-height: 100vh; display: flex;
      background-color: #09090d; overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e3e3e8; -webkit-font-smoothing: antialiased;
    }

    /* ========== 2. 左侧极简固定侧边栏 ========== */
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; width: 72px;
      background-color: #050507; border-right: 1px solid rgba(255,255,255,0.03);
      display: flex; flex-direction: column; justify-content: space-between;
      padding: 24px 0; z-index: 10;
    }
    .sidebar-top { display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%; }
    .logo-badge {
      width: 36px; height: 36px; background-color: #12121a;
      border: 1px solid rgba(255,255,255,0.05); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 600; color: #8b3dff; margin-bottom: 12px;
    }
    .sidebar-btn {
      width: 44px; height: 44px; background: transparent; border: none;
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background-color 0.2s;
    }
    .sidebar-btn:hover { background-color: rgba(255,255,255,0.04); }
    .sidebar-btn.active { background-color: rgba(139, 61, 255, 0.12); }
    .sidebar-btn svg { width: 20px; height: 20px; fill: none; stroke: #9da0a6; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .sidebar-btn:hover svg { stroke: #ffffff; }
    .sidebar-btn.active svg { stroke: #8b3dff; }
    .sidebar-bottom { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #8b3dff, #3bcaf5); }

    /* ========== 3. 主看板工作区 ========== */
    .main-viewport {
      flex: 1; margin-left: 72px; min-height: 100vh; display: flex;
      flex-direction: column; align-items: center; padding: 56px 40px; position: relative;
    }
    .glow-backdrop {
      position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%);
      width: 750px; height: 480px;
      background: radial-gradient(circle, rgba(139, 61, 255, 0.14) 0%, rgba(59, 202, 245, 0.05) 45%, transparent 70%);
      filter: blur(110px); z-index: 0; pointer-events: none;
    }
    .workspace { width: 100%; max-width: 940px; z-index: 2; display: flex; flex-direction: column; }

    /* ========== 4. 磨砂玻璃画板 ========== */
    .hero-glass {
      width: 100%; background: rgba(17, 17, 24, 0.35);
      border: 1px solid rgba(255,255,255,0.04); border-radius: 24px;
      padding: 44px 32px; text-align: center;
      backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      margin-bottom: 44px;
    }
    .hero-title { color: #ffffff; font-size: 32px; font-weight: 500; letter-spacing: -0.5px; margin-bottom: 8px; }
    .hero-subtitle { font-size: 13px; color: #555761; margin-bottom: 32px; }

    /* ========== 5. 输入框舱 ========== */
    .input-pod {
      width: 100%; max-width: 640px; margin: 0 auto;
      background-color: rgba(10, 10, 15, 0.85);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 16px;
      padding: 12px; transition: border-color 0.25s, box-shadow 0.25s;
    }
    .input-pod:focus-within {
      border-color: rgba(139, 61, 255, 0.35);
      box-shadow: 0 0 24px rgba(139, 61, 255, 0.06);
    }
    .pod-textarea {
      width: 100%; height: 64px; background: transparent; border: none;
      color: #ffffff; font-size: 14px; line-height: 1.6; padding: 2px 6px;
      outline: none; resize: none; font-family: inherit;
    }
    .pod-textarea::placeholder { color: #4b4d54; }
    .pod-control-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 12px; margin-top: 6px; border-top: 1px solid rgba(255,255,255,0.02);
    }
    .upload-trigger {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
      padding: 6px 12px; border-radius: 8px; color: #9da0a6; font-size: 12px;
      cursor: pointer; transition: all 0.15s;
    }
    .upload-trigger:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); color: #fff; }
    .upload-trigger svg { fill: none; stroke: currentColor; stroke-width: 2; }
    .submit-btn {
      background-color: #8b3dff; color: #ffffff; border: none;
      padding: 7px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: opacity 0.2s;
      box-shadow: 0 4px 12px rgba(139,61,255,0.2);
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 文件回显 */
    .file-echo {
      display: none; align-items: center; gap: 10px; margin-top: 10px;
      padding: 8px; background: rgba(0,0,0,0.2); border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.02);
    }
    .file-echo.show { display: flex; }
    .echo-thumb { position: relative; width: 36px; height: 36px; border-radius: 4px; overflow: hidden; }
    .echo-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .echo-remove {
      position: absolute; top: 0; right: 0; background: rgba(0,0,0,0.8);
      color: #fff; border: none; width: 14px; height: 14px; font-size: 9px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .echo-name { font-size: 12px; color: #8b8d99; }

    /* ========== 6. 结果展示区 ========== */
    .result-zone {
      width: 100%; margin-bottom: 32px; background: #12121a;
      border: 1px solid rgba(255,255,255,0.04); border-radius: 20px;
      overflow: hidden; display: none;
    }
    .result-zone.show { display: block; }
    .result-zone img { width: 100%; max-height: 560px; object-fit: contain; display: block; }
    .result-actions {
      display: flex; justify-content: center; gap: 10px;
      padding: 14px; border-top: 1px solid rgba(255,255,255,0.03);
    }
    .btn-download {
      background: #8b3dff; color: #fff; border: none;
      padding: 9px 22px; border-radius: 10px; font-size: 13px; cursor: pointer;
    }
    .btn-retry {
      background: transparent; color: #9da0a6; border: 1px solid rgba(255,255,255,0.06);
      padding: 9px 22px; border-radius: 10px; font-size: 13px; cursor: pointer;
    }

    /* ========== 7. 灵感画廊 ========== */
    .gallery { display: flex; flex-direction: column; align-items: center; }
    .gallery-title { font-size: 20px; font-weight: 500; color: #ffffff; margin-bottom: 6px; }
    .gallery-subtitle { font-size: 12px; color: #4c4e56; margin-bottom: 28px; }
    .filter-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; margin-bottom: 32px; }
    .filter-chip {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.03);
      padding: 6px 16px; border-radius: 20px; font-size: 12px; color: #9da0a6;
      cursor: pointer; transition: all 0.15s;
    }
    .filter-chip:hover { border-color: rgba(255,255,255,0.1); color: #fff; }
    .filter-chip.active { background: #ffffff; border-color: #ffffff; color: #09090d; font-weight: 500; }

    /* 瀑布流 */
    .waterfall { display: flex; gap: 16px; width: 100%; align-items: flex-start; }
    .waterfall-col { flex: 1; display: flex; flex-direction: column; gap: 16px; }
    .wf-card {
      background: #12121a; border: 1px solid rgba(255,255,255,0.03);
      border-radius: 16px; overflow: hidden;
      transition: border-color 0.25s, transform 0.25s cubic-bezier(0.2, 1, 0.2, 1);
    }
    .wf-card:hover { border-color: rgba(255,255,255,0.08); transform: translateY(-2px); }
    .wf-card img { width: 100%; height: auto; display: block; background: #181824; }
    .wf-info { padding: 14px; border-top: 1px solid rgba(255,255,255,0.01); }
    .wf-text { font-size: 12px; color: #919199; line-height: 1.5; }

    /* ========== 8. 个人资料卡 ========== */
    .profile-page { width: 100%; max-width: 640px; z-index: 2; }
    .profile-card {
      background: #12121a; border: 1px solid rgba(255,255,255,0.04);
      border-radius: 20px; padding: 32px;
    }
    .profile-header {
      display: flex; align-items: center; gap: 16px;
      padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .profile-big-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, #8b3dff, #3bcaf5);
    }
    .profile-name { font-size: 20px; font-weight: 500; color: #fff; }
    .profile-uid { font-size: 12px; color: #555761; margin-top: 4px; }
    .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
    .profile-grid-item { display: flex; flex-direction: column; }
    .profile-grid-item label { color: #555761; font-size: 12px; }
    .profile-grid-item span { color: #fff; font-size: 14px; margin-top: 4px; }

    /* ========== 9. 配置弹窗 ========== */
    .config-modal {
      position: fixed; inset: 0; background: rgba(7,7,10,0.9);
      backdrop-filter: blur(10px); display: none;
      justify-content: center; align-items: center; z-index: 100;
    }
    .config-modal.show { display: flex; }
    .config-card {
      background: #12121a; border: 1px solid rgba(255,255,255,0.04);
      border-radius: 20px; padding: 28px; width: 440px;
    }
    .config-title { color: #fff; font-size: 16px; font-weight: 500; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .form-group label { color: #9da0a6; font-size: 12px; }
    .form-group input {
      background: #09090d; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px; padding: 12px; color: #fff; font-size: 13px; outline: none;
    }
    .form-group input:focus { border-color: rgba(139,61,255,0.35); }
    .config-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
    .btn-cancel { background: transparent; border: none; color: #9da0a6; cursor: pointer; font-size: 13px; }
    .btn-save { background: #fff; color: #09090d; border: none; padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }

    /* ========== 10. Toast ========== */
    .app-toast {
      position: fixed; top: 24px; right: 24px;
      background: #12121a; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px; padding: 12px 18px;
      color: #9da0a6; font-size: 12px; z-index: 200; display: none;
    }

    /* 旋转动画 */
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <input type="file" id="file-input" accept="image/*" style="display: none;">

  <!-- Toast -->
  <div class="app-toast" id="app-toast"></div>

  <!-- 配置弹窗 -->
  <div class="config-modal" id="config-modal">
    <div class="config-card">
      <h2 class="config-title">中转站 API 接口配置</h2>
      <div class="form-group">
        <label>中转站 API 接口域名 (Base URL)</label>
        <input type="text" id="cfg-url" placeholder="https://api.your-relay.com/v1">
      </div>
      <div class="form-group">
        <label>您的中转站 Secret Key</label>
        <input type="password" id="cfg-key" placeholder="sk-................................">
      </div>
      <div class="config-actions">
        <button class="btn-cancel" id="btn-config-cancel">取消</button>
        <button class="btn-save" id="btn-config-save">保存配置</button>
      </div>
    </div>
  </div>

  <!-- 侧边栏 -->
  <nav class="sidebar">
    <div class="sidebar-top">
      <div class="logo-badge">E</div>
      <button class="sidebar-btn active" id="nav-create" title="智能创作">
        <svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      </button>
      <button class="sidebar-btn" id="nav-profile" title="个人资料">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
    </div>
    <div class="sidebar-bottom">
      <div class="user-avatar"></div>
    </div>
  </nav>

  <!-- 主看板 -->
  <main class="main-viewport">
    <div class="glow-backdrop"></div>

    <!-- 右上角配置入口 -->
    <div style="position:absolute;top:24px;right:24px;z-index:5;">
      <button class="sidebar-btn" id="trigger-config-modal" title="配置网关">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>

    <!-- 智能创作面板 -->
    <div class="workspace" id="panel-create">
      <div class="hero-glass">
        <h1 class="hero-title">将想象 变成画面</h1>
        <p class="hero-subtitle">人类已开启 Image2026 流式大视觉创作纪元</p>

        <div class="input-pod">
          <textarea class="pod-textarea" id="prompt-input" placeholder="融合自备素材或描述场景特征进行精细化生成..."></textarea>
          <div class="pod-control-bar">
            <div class="upload-trigger" id="btn-upload">
              <svg width="14" height="14" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              <span>参考商品底图</span>
            </div>
            <button class="submit-btn" id="btn-generate">立即生成</button>
          </div>
          <div class="file-echo" id="file-echo">
            <div class="echo-thumb">
              <img id="echo-img" src="" alt="">
              <button class="echo-remove" id="btn-echo-remove">×</button>
            </div>
            <span class="echo-name" id="echo-name"></span>
          </div>
        </div>
      </div>

      <!-- 结果区 -->
      <div class="result-zone" id="result-zone"></div>

      <!-- 灵感画廊 -->
      <div class="gallery">
        <h2 class="gallery-title">灵感画廊</h2>
        <p class="gallery-subtitle">探寻并复用社区精选的商用创意提示词</p>
        <div class="filter-row" id="filter-row">
          <button class="filter-chip active" data-cat="all">全部</button>
          <button class="filter-chip" data-cat="portrait">人像 / 角色</button>
          <button class="filter-chip" data-cat="illustration">动漫 / 插画</button>
          <button class="filter-chip" data-cat="nature">自然 / 风景</button>
          <button class="filter-chip" data-cat="product">商品 / 核心</button>
          <button class="filter-chip" data-cat="feedback">产品 / 反馈</button>
        </div>
        <div class="waterfall" id="waterfall"></div>
      </div>
    </div>

    <!-- 个人资料面板 -->
    <div class="profile-page" id="panel-profile" style="display:none;">
      <div class="profile-card">
        <div class="profile-header">
          <div class="profile-big-avatar"></div>
          <div>
            <h2 class="profile-name">zhaomuyuan</h2>
            <p class="profile-uid">UID: 2026060801</p>
          </div>
        </div>
        <div class="profile-grid">
          <div class="profile-grid-item"><label>账户角色</label><span>超级个体前端开发 / 商户</span></div>
          <div class="profile-grid-item"><label>自备网关</label><span>中转站安全密钥加密托管中</span></div>
          <div class="profile-grid-item"><label>网络节点</label><span>China Base Node</span></div>
          <div class="profile-grid-item"><label>引擎配置</label><span>Multi-Agent Engine v1.0</span></div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // ========== 灵感画廊数据 ==========
    const GALLERY = [
      { id:1, cat:'product', img:'https://images.unsplash.com/photo-1534452203293-499d3a55a791?auto=format&fit=crop&w=400&q=80', title:'大理石台面，自然柔和顶光，高端奢华彩妆展陈' },
      { id:2, cat:'scene',   img:'https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=400&q=80', title:'现代简约客厅，午后阳光斜射，温馨家居氛围' },
      { id:3, cat:'nature',  img:'https://images.unsplash.com/photo-1513542789411-b6a5d4f31634?auto=format&fit=crop&w=400&q=80', title:'户外森林庭院，绿植环绕，原木质感清晨光影' },
      { id:4, cat:'product', img:'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=400&q=80', title:'轻奢质感厨房橱柜，冷感金属补光，高端厨电融合场景' },
      { id:5, cat:'portrait',img:'https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=400&q=80', title:'法式复古街头，柔焦自然外景光，服饰模特街拍质感' },
      { id:6, cat:'digital', img:'https://images.unsplash.com/photo-1547119957-637f8679db1e?auto=format&fit=crop&w=400&q=80', title:'暗黑系极客桌面，赛博朋克霓虹背光，电子数码特写场景' },
    ];

    // ========== DOM ==========
    const $ = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);
    const fileInput = $('#file-input');
    const promptInput = $('#prompt-input');
    const btnUpload = $('#btn-upload');
    const btnGenerate = $('#btn-generate');
    const fileEcho = $('#file-echo');
    const echoImg = $('#echo-img');
    const echoName = $('#echo-name');
    const resultZone = $('#result-zone');
    const waterfall = $('#waterfall');
    const filterRow = $('#filter-row');
    const toast = $('#app-toast');

    let activeFile = null;
    let currentResultUrl = '';
    let isGenerating = false;

    // ========== 侧边栏导航 ==========
    $('#nav-create').addEventListener('click', () => {
      $$('.sidebar-btn').forEach(b => b.classList.remove('active'));
      $('#nav-create').classList.add('active');
      $('#panel-create').style.display = '';
      $('#panel-profile').style.display = 'none';
    });
    $('#nav-profile').addEventListener('click', () => {
      $$('.sidebar-btn').forEach(b => b.classList.remove('active'));
      $('#nav-profile').classList.add('active');
      $('#panel-create').style.display = 'none';
      $('#panel-profile').style.display = '';
    });

    // ========== 配置弹窗 ==========
    const configModal = $('#config-modal');
    $('#trigger-config-modal')?.addEventListener('click', () => configModal.classList.add('show'));
    $('#btn-config-cancel').addEventListener('click', () => configModal.classList.remove('show'));
    $('#btn-config-save').addEventListener('click', () => {
      localStorage.setItem('user_api_url', $('#cfg-url').value.trim());
      localStorage.setItem('user_api_key', $('#cfg-key').value.trim());
      configModal.classList.remove('show');
      showToast('配置已保存');
    });
    if (localStorage.getItem('user_api_url')) $('#cfg-url').value = localStorage.getItem('user_api_url');
    if (localStorage.getItem('user_api_key')) $('#cfg-key').value = localStorage.getItem('user_api_key');

    // ========== 文件上传 ==========
    btnUpload.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      if (!fileInput.files[0]) return;
      activeFile = fileInput.files[0];
      echoImg.src = URL.createObjectURL(activeFile);
      echoName.textContent = activeFile.name + ' 已锁定';
      fileEcho.classList.add('show');
    });
    $('#btn-echo-remove').addEventListener('click', () => {
      activeFile = null; fileInput.value = '';
      fileEcho.classList.remove('show');
    });

    // ========== 灵感画廊渲染 ==========
    function renderGallery(cat) {
      const items = cat === 'all' ? GALLERY : GALLERY.filter(g => g.cat === cat);
      const cols = [[], [], []];
      items.forEach((item, i) => cols[i % 3].push(item));
      waterfall.innerHTML = cols.map(col =>
        `<div class="waterfall-col">${col.map(item =>
          `<div class="wf-card">
            <img src="${item.img}" alt="${item.title}">
            <div class="wf-info"><p class="wf-text">${item.title}</p></div>
          </div>`
        ).join('')}</div>`
      ).join('');
    }
    renderGallery('all');

    filterRow.addEventListener('click', e => {
      const chip = e.target.closest('.filter-chip');
      if (!chip) return;
      $$('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      renderGallery(chip.dataset.cat);
    });

    // ========== API 生成 ==========
    btnGenerate.addEventListener('click', handleGenerate);
    promptInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleGenerate(); } });

    async function handleGenerate() {
      if (isGenerating) return;
      const text = promptInput.value.trim();
      if (!text) { showToast('请输入场景描述'); return; }
      if (!activeFile) { showToast('请先上传商品底图'); return; }

      isGenerating = true;
      btnGenerate.disabled = true;

      resultZone.classList.add('show');
      resultZone.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:60px 20px;">
          <div style="width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,0.06);border-top-color:#8b3dff;animation:spin .8s linear infinite;"></div>
          <div style="color:#9da0a6;font-size:13px;">正在融合生成场景图...</div>
        </div>`;

      const reader = new FileReader();
      reader.onload = async e => {
        const base64 = e.target.result.split(',')[1];
        try {
          const res = await fetch('/api/generate-scene-fusion', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: base64, sceneDesc: text }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '生成失败');

          let imgUrl = '';
          if (data.result?.data?.[0]?.url) imgUrl = data.result.data[0].url;
          else if (data.result?.data?.[0]?.b64_json) imgUrl = 'data:image/png;base64,' + data.result.data[0].b64_json;
          else throw new Error('API 未返回图片');

          currentResultUrl = imgUrl;
          resultZone.innerHTML = `
            <img src="${imgUrl}">
            <div class="result-actions">
              <button class="btn-download" id="btn-dl">下载图片</button>
              <button class="btn-retry" id="btn-retry">重新生成</button>
            </div>`;
          $('#btn-dl').addEventListener('click', () => { const a = document.createElement('a'); a.href = currentResultUrl; a.download = `scene_${Date.now()}.png`; a.click(); });
          $('#btn-retry').addEventListener('click', handleGenerate);
        } catch (err) {
          resultZone.innerHTML = `<div style="color:#cc5570;font-size:13px;text-align:center;padding:40px 20px;">${err.message}</div>`;
        } finally {
          isGenerating = false;
          btnGenerate.disabled = false;
        }
      };
      reader.readAsDataURL(activeFile);
    }

    // ========== 工具函数 ==========
    function showToast(msg) {
      toast.textContent = msg;
      toast.style.display = 'block';
      clearTimeout(toast._t);
      toast._t = setTimeout(() => toast.style.display = 'none', 3000);
    }
  </script>
</body>
</html>
